# ============================================
# Docker Compose — Development
# ============================================
services:
    server:
        build:
            context: .
            dockerfile: Dockerfile.dev
        container_name: url-shortener-dev
        ports:
            - "${FASTIFY_PORT}:${FASTIFY_PORT}"
        env_file: .env
        environment:
            NODE_ENV: development
            DATABASE_HOST: database
            DATABASE_PORT: 5432
            REDIS_HOST: redis
        volumes:
            - .:/app
            - /app/node_modules
        depends_on:
            database:
                condition: service_healthy
            redis:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - app-network

    database:
        image: postgres:16
        container_name: url-shortener-database-dev
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: ${DATABASE_USER}
            POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
            POSTGRES_DB: ${DATABASE_NAME}
        volumes:
            - db_data_dev:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d ${DATABASE_NAME}"]
            interval: 5s
            timeout: 5s
            retries: 5
        restart: unless-stopped
        networks:
            - app-network

    redis:
        image: redis:7.4-alpine
        container_name: url-shortener-redis-dev
        ports:
            - "6379:6379"
        command: redis-server --requirepass ${REDIS_PASSWORD}
        healthcheck:
            test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
            interval: 5s
            timeout: 5s
            retries: 5
        volumes:
            - cache_dev:/data
        restart: unless-stopped
        networks:
            - app-network

volumes:
    db_data_dev:
        driver: local
    cache_dev:
        driver: local

networks:
    app-network:
        driver: bridge
